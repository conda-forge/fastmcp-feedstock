# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  name: fastmcp
  version: 3.3.1

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/fastmcp-${{ version }}.tar.gz
  sha256: 979362ea557de42a5f40342563c7e4b236bcc8e7cd192715f50030695d1a71cd

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  python:
    entry_points:
      - fastmcp = fastmcp.cli:app

requirements:
  host:
    - python ${{ python_min }}.*
    - hatchling
    - uv-dynamic-versioning >=0.7.0
    - pip
  run:
    - python >=${{ python_min }},<4
    - pydantic-settings
    - starlette
    - httpcore
    - fastmcp-slim ==3.3.1
    - pydantic-core
    - cryptography
    - pydocket
    - typing_extensions
  run_constraints:
    - openai >=1.102.0
    - anthropic >=0.48.0
    - azure-identity >=1.16.0
    - google-genai >=1.18.0
    - prefab-ui >=0.18.0
    - pydocket >=0.19.0
    - pydantic-monty ==0.0.11
    - pyjwt >=2.12.0

tests:
  - python:
      imports:
        - fastmcp
      pip_check: true
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
        - pip
    script:
      - fastmcp --help

about:
  summary: The fast, Pythonic way to build MCP servers and clients.
  homepage: https://github.com/jlowin/fastmcp
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - rxm7706
    - dbast
    - moritzwilksch
